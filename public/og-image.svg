<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative rings -->
  <circle cx="980" cy="120" r="220" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.08"/>
  <circle cx="980" cy="120" r="160" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.06"/>
  <circle cx="200" cy="520" r="180" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.05"/>

  <!-- Logo ring -->
  <circle cx="120" cy="100" r="38" fill="none" stroke="#14b8a6" stroke-width="3"/>
  <circle cx="120" cy="100" r="20" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity="0.3"/>

  <!-- Brand name -->
  <text x="174" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="300" fill="white" letter-spacing="8">AROGYO</text>
  <text x="174" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="300" fill="white" letter-spacing="8">
    <tspan>AROGYO</tspan><tspan fill="#14b8a6" font-weight="800">S</tspan>
  </text>
  <text x="176" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#14b8a6" letter-spacing="4">INTELLIGENCE</text>

  <!-- Main headline -->
  <text x="120" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="300" fill="white">Know Your</text>
  <text x="120" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="800" fill="#14b8a6">Biological Age.</text>

  <!-- Subtext -->
  <text x="120" y="430" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.5)">50+ biomarkers · Lab report analysis · Personalised longevity plan</text>

  <!-- CTA pill -->
  <rect x="120" y="480" width="260" height="56" rx="28" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="250" y="514" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#14b8a6" text-anchor="middle" letter-spacing="1">arogyos.com</text>
</svg>
